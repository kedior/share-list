<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片缩放压缩>>Base64</title>
</head>
<body>
    <h2>选择或粘贴图片并选择压缩程度和尺寸</h2>

    <label for="quality-range">压缩程度：</label>
    <input type="range" id="quality-range" min="0" max="100" value="80">
    <span id="quality-value">80</span>%<br><br>

    <label for="scale-range">缩放比例：</label>
    <input type="range" id="scale-range" min="10" max="100" value="100">
    <span id="scale-value">100</span>%<br><br>

    <div id="select-div">
        <label for="select-image">选择一张图片:</label>
        <input type="file" id="image-select" accept="image/png, image/jpeg" required>
    </div>

    <button id="compress-button" disabled>确定</button>
    <p>原始尺寸: <span id="original-size">-</span></p>
    <p>预计缩放后的尺寸: <span id="scaled-size">-</span></p>
    <p>预计输出大小: <span id="output-size">-</span></p>
    <img id="output-image" alt="输出图像" style="max-width: 100%; display:none;"><br><br>
    <h3>base64 output:<h3>
    <textarea id="base64-output" style="width: 100%; height: 100px;" readonly></textarea>

    <script>
        let imgFile = null;

        // 更新质量值和缩放比例显示
        const qualityRange = document.getElementById("quality-range");
        const qualityValue = document.getElementById("quality-value");
        const scaleRange = document.getElementById("scale-range");
        const scaleValue = document.getElementById("scale-value");
        const imageSelect = document.getElementById('image-select');
        const selectDiv = document.getElementById('select-div');

        qualityRange.addEventListener("input", () => {
            qualityValue.textContent = qualityRange.value;
            if (imgFile) updateOutputSize();
        });

        scaleRange.addEventListener("input", () => {
            scaleValue.textContent = scaleRange.value;
            if (imgFile) displayImageSizes();
        });

        // 处理粘贴事件
        document.addEventListener('paste', (event) => {
            const items = event.clipboardData.items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf("image") !== -1) {
                    imgFile = items[i].getAsFile();
                    selectDiv.innerHTML = '已从剪切板读取图片';
                    document.getElementById("compress-button").disabled = false;
                    displayImageSizes();
                    document.getElementById("compress-button").click();
                    break;
                }
            }
        });


        // 添加选择文件change 事件监听器
        imageSelect.addEventListener('change', function() {
            imgFile = imageSelect.files[0];
            document.getElementById("compress-button").disabled = false;
            displayImageSizes();
            document.getElementById("compress-button").click();
        });

        // 显示原始尺寸和预计缩放后的尺寸
        function displayImageSizes() {
            if (!imgFile) return;
            const reader = new FileReader();
            reader.readAsDataURL(imgFile);
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const originalWidth = img.width;
                    const originalHeight = img.height;
                    document.getElementById("original-size").textContent = `${originalWidth} x ${originalHeight} px`;

                    const scale = scaleRange.value / 100;
                    const scaledWidth = Math.round(originalWidth * scale);
                    const scaledHeight = Math.round(originalHeight * scale);
                    document.getElementById("scaled-size").textContent = `${scaledWidth} x ${scaledHeight} px`;

                    updateOutputSize();
                };
            };
        }

        // 更新预计输出大小
        function updateOutputSize() {
            if (!imgFile) return;
            const reader = new FileReader();
            reader.readAsDataURL(imgFile);
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const scale = scaleRange.value / 100;
                    const canvas = document.createElement("canvas");
                    const ctx = canvas.getContext("2d");
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    canvas.toBlob((blob) => {
                        document.getElementById("output-size").textContent = Math.round(blob.size / 1024) + " KB";
                    }, "image/jpeg", qualityRange.value / 100);
                };
            };
        }

        // 处理压缩、缩放和输出Base64
        document.getElementById("compress-button").addEventListener("click", () => {
            if (!imgFile) return;
            const reader = new FileReader();
            reader.readAsDataURL(imgFile);
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const scale = scaleRange.value / 100;
                    const canvas = document.createElement("canvas");
                    const ctx = canvas.getContext("2d");
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    canvas.toBlob((blob) => {
                        const base64Output = document.getElementById("base64-output");
                        const outputImage = document.getElementById("output-image");
                        const reader = new FileReader();
                        reader.readAsDataURL(blob);
                        reader.onload = function(event) {
                            outputImage.src = event.target.result;
                            outputImage.style.display = "block";
                            base64Output.value = event.target.result;
                        };
                    }, "image/jpeg", qualityRange.value / 100);
                };
            };
        });
    </script>
</body>
</html>
